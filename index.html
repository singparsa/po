<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Guard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📵 Focus Guard</h1>
    <p>스마트폰 과사용 방지 앱</p>

    <div class="card">
      <h2>📚 공부 집중 모드</h2>

      <label>공부 시간 설정 (분)</label>
      <input type="number" id="studyTime" placeholder="예: 30">

      <button onclick="startStudyMode()">집중 시작</button>

      <h3 id="timer">00:00</h3>
    </div>

    <div class="card">
      <h2>🌙 수면 모드</h2>

      <button onclick="startSleepMode()">수면 모드 시작</button>
    </div>
  </div>

  <div id="overlay">
    <div class="overlay-content">
      <h1>🚫 집중 중입니다</h1>
      <p>지금은 공부 시간입니다.</p>
      <button onclick="exitMode()">종료</button>
    </div>
  </div>

  <div id="sleepOverlay">
    <div class="overlay-content">
      <h1>😴 수면 시간입니다</h1>
      <p>스마트폰 사용을 줄여보세요.</p>
      <button onclick="exitSleepMode()">해제</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
